{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}ScrapiFy{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>
    <div class="page">
        <header class="topbar">
            <div class="container topbar__inner">
                <a class="logo" href="{% url 'landing' %}">
                    <span class="logo__mark">S</span>
                    <span class="logo__text">ScrapiFy</span>
                </a>
                <nav class="nav">
                    <a href="{% url 'buyer_auth' %}">Buy</a>
                    <a href="{% url 'seller_auth' %}">Sell</a>
                </nav>
                <button class="nav__toggle" id="navToggle">Menu</button>
            </div>
        </header>

        <main class="content">
            {% block content %}{% endblock %}
        </main>

        <footer class="footer">
            <div class="container footer__inner">
                <p>© 2026 ScrapiFy. Built for a cleaner tomorrow.</p>
                <div class="footer__links">
                    <a href="{% url 'buyer_auth' %}">Buyer</a>
                    <a href="{% url 'seller_auth' %}">Seller</a>
                </div>
            </div>
        </footer>
    </div>

    <script src="{% static 'js/app.js' %}"></script>
</body>
</html>
